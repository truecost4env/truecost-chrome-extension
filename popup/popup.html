<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrueCost Dashboard</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <!-- Header -->
    <header class="popup-header">
      <div class="popup-logo">
        <svg viewBox="0 0 24 24" fill="white" width="18" height="18"><path d="M17 8C8 10 5.9 16.17 3.82 21.34l1.89.66.95-2.71c.72.36 1.5.57 2.34.57C14.28 19.86 19 15.14 19 10c0-4-2-6.5-2-6.5S18.67 6 17 8z"/></svg>
      </div>
      <div>
        <h1 class="popup-title">TrueCost</h1>
        <p class="popup-version">v2.0 — Environmental Impact Tracker</p>
      </div>
      <label class="popup-toggle" title="Enable / Disable">
        <input type="checkbox" id="toggle-enabled" checked />
        <span class="popup-toggle-slider"></span>
      </label>
    </header>

    <!-- Stats Grid -->
    <section class="popup-stats">
      <div class="stat-card stat-card--carbon">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24"><path d="M19.35 10.04A7.49 7.49 0 0012 4C9.11 4 6.6 5.64 5.35 8.04A5.994 5.994 0 000 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/></svg>
        </div>
        <div class="stat-value" id="stat-carbon">0</div>
        <div class="stat-label">kgCO₂e Carbon</div>
      </div>
      <div class="stat-card stat-card--water">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2c-5.33 4.55-8 8.48-8 11.8C4 18.78 7.8 22 12 22s8-3.22 8-8.2c0-3.32-2.67-7.25-8-11.8z"/></svg>
        </div>
        <div class="stat-value" id="stat-water">0</div>
        <div class="stat-label">Liters Water</div>
      </div>
      <div class="stat-card stat-card--waste">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        </div>
        <div class="stat-value" id="stat-waste">0</div>
        <div class="stat-label">Kg Waste</div>
      </div>
      <div class="stat-card stat-card--energy">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg>
        </div>
        <div class="stat-value" id="stat-energy">0</div>
        <div class="stat-label">MJ Energy</div>
      </div>
    </section>

    <!-- Summary row -->
    <section class="popup-summary">
      <div class="summary-item">
        <span class="summary-label">Products viewed</span>
        <span class="summary-value" id="stat-products">0</span>
      </div>
      <div class="summary-item">
        <span class="summary-label">Offset donations</span>
        <span class="summary-value summary-value--green" id="stat-donation">$0.00</span>
      </div>
    </section>

    <!-- Actions -->
    <section class="popup-actions">
      <button class="btn btn--reset" id="btn-reset">Reset Stats</button>
    </section>

    <footer class="popup-footer">
      Data sourced from manufacturer sustainability reports •
      <a href="https://github.com/truecost4env" target="_blank">GitHub</a>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
